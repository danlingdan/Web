<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel 数据看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <header class="hero">
      <div>
        <p class="kicker">华瑞新材</p>
        <h1>录课改进供应数据看板</h1>
        <p class="subtitle">
          同时展示供应数据、供应商表、设备零件表，并支持分表抓取
        </p>
      </div>
      <div class="actions">
        <a class="btn" id="download-csv" href="/api/data.csv" target="_blank" rel="noreferrer">下载 CSV</a>
        <a class="btn" id="download-sql" href="/api/mysql.sql" target="_blank" rel="noreferrer">下载 MySQL SQL</a>
      </div>
    </header>

    <main class="panel">
      <div class="sheet-tabs" id="sheet-tabs"></div>
      <div class="meta" id="meta">正在加载数据...</div>
      <div class="table-wrap">
        <table id="data-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <p class="hint">
        可通过 <code>/api/data?sheet=供应数据</code>、<code>/api/data?sheet=供应商表</code>、<code>/api/data?sheet=设备零件表</code> 分别抓取。
      </p>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
