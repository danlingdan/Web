<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel 数据看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <header class="hero">
      <div>
        <p class="kicker">MySQL Ready</p>
        <h1>Excel 数据展示与采集页面</h1>
        <p class="subtitle">
          页面数据来自 Excel，数量列已用随机数替换。支持爬虫直接抓取 JSON，或下载 SQL/CSV 直接入库。
        </p>
      </div>
      <div class="actions">
        <a class="btn" href="/api/data" target="_blank" rel="noreferrer">JSON 接口</a>
        <a class="btn" href="/api/data.csv" target="_blank" rel="noreferrer">下载 CSV</a>
        <a class="btn" href="/api/mysql.sql" target="_blank" rel="noreferrer">下载 MySQL SQL</a>
      </div>
    </header>

    <main class="panel">
      <div class="meta" id="meta">正在加载数据...</div>
      <div class="table-wrap">
        <table id="data-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <p class="hint">
        爬虫建议抓取 <code>/api/data</code>。该接口返回结构化 JSON，字段稳定，适合直接映射到 MySQL。
      </p>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
