<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel 数据看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <header class="hero">
      <div>
        <p class="kicker">华瑞新材</p>
        <h1>生产设备/零件采购数据</h1>
        <p class="subtitle">
          单月Excel采购数据，可下载SQL/CSV 直接入库
        </p>
      </div>
      <div class="actions">
        <a class="btn" href="/api/data.csv" target="_blank" rel="noreferrer">下载 CSV</a>
        <a class="btn" href="/api/mysql.sql" target="_blank" rel="noreferrer">下载 MySQL SQL</a>
      </div>
    </header>

    <main class="panel">
      <div class="meta" id="meta">正在加载数据...</div>
      <div class="table-wrap">
        <table id="data-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <p class="hint">
        本页数据来自 Excel 第二工作表，字段适合直接导入数据库。
      </p>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
