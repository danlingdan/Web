<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel 数据看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <header class="hero">
      <div>
        <p class="kicker">华瑞新材</p>
        <h1>供应链数据管理平台</h1>
        <p class="subtitle">
          供应商与设备零件采购信息管理系统
        </p>
      </div>
      <div class="actions">
        <a class="btn" id="download-csv" href="/api/data.csv" target="_blank" rel="noreferrer">下载 CSV</a>
        <a class="btn" id="download-sql" href="/api/mysql.sql" target="_blank" rel="noreferrer">下载 MySQL SQL</a>
      </div>
    </header>

    <main class="panel">
      <div class="sheet-tabs" id="sheet-tabs"></div>
      <div class="meta" id="meta">正在加载数据...</div>
      <div class="table-wrap">
        <table id="data-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <p class="hint">
        提供数据导出功能，支持 CSV 和 SQL 格式。
      </p>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
